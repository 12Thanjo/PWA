<!DOCTYPE html>
<html>
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="viewport" id="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" href="icon.png"/>

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Envaid</title>

		<link rel="stylesheet" href="colors.css">
		<style type="text/css">

			body{
				margin: 0px;
				overflow-x: hidden;

				background: var(--coolGray_800);
				color: var(--coolGray_100);

				font-family: "Helvetica", "Sans-serif";
			}

			#textarea {
				width: calc(100% - 20px);
				margin: 0px;
				border: 0px;
				padding: 10px;

				background: var(--coolGray_700);
				color: var(--coolGray_50);
				font-family: "Helvetica", "Sans-serif";
				border-radius: 0px;

				font-size: 7vh;
			}

			#buttons{
				display: block;
				text-align: center;
			}
			#up, #down, #speak, #tools{
				background-color: #555555;
				width: 25vw;
				font-size: 2vw;
				float: left;
			}
			
		</style>
	</head>
	<body>
		<div id="header">
			<textarea id="textarea"></textarea>
			<div id="buttons">
	    		<div id="up">
	    			<h1>↑</h1>
	    		</div>
	    		<div id="down">
	    			<h1>↓</h1>
	    		</div>
	    		<div id="speak">
	    			<h1>Speak</h1>
	    		</div>
	    		<div id="tools">
	    			<h1>Special</h1>
	    		</div>
    		</div>
		</div>


		<button onclick="location.reload()">Reload</button>


		<script type="text/javascript" src="main.js"></script>
	</body>
</html>
