<!DOCTYPE html>
<html>
	<meta name="apple-mobile-web-app-capable" content="yes" />
	<meta name="viewport" id="viewport" content="width=device-width,minimum-scale=1.0,maximum-scale=1.0" />
	<meta name="apple-mobile-web-app-status-bar-style" content="black" />
	<link rel="apple-touch-icon" href="icon.png"/>

	<head>
		<meta charset="utf-8">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<title>Envaid</title>

		<link rel="stylesheet" href="colors.css">
		<style type="text/css">

			body{
				margin: 0px;
				overflow-x: hidden;

				background: var(--coolGray_800);
				color: var(--coolGray_100);

				font-family: "Helvetica", "Sans-serif";
			}

			#textarea {
				width: calc(100% - 20px);
				margin: 0px;
				border-width: 0px;
				padding: 10px;
				outline: none;

				background: var(--coolGray_700);
				color: var(--coolGray_50);
				font-family: "Helvetica", "Sans-serif";
				border-radius: 0px;

				font-size: 7vh;
			}

			#buttons{
				display: block;
				text-align: center;

			}

			#up, #down, #speak, #tools{
				background-color: #555555;
				height: 15vw;
				float: left;
				margin: 0px;
			}

			#up, #down{
				width: 20vw;
				font-size: 3vw;
			}

			#speak, #tools{
				width: 30vw;
				font-size: 3vw;
			}
			
		</style>
	</head>
	<body>
		<div id="header">
			<textarea id="textarea" oninput="resize_textarea()"></textarea>
			<div id="buttons">
	    		<div id="up">
	    			<h1>↑</h1>
	    		</div>
	    		<div id="down">
	    			<h1>↓</h1>
	    		</div>
	    		<div id="speak">
	    			<h1>{Speak}</h1>
	    		</div>
	    		<div id="tools">
	    			<h1>{Special}</h1>
	    		</div>
    		</div>
		</div>



		<script type="text/javascript" src="main.js"></script>
	</body>
</html>
